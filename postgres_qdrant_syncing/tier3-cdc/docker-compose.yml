version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    command: >
      postgres
        -c wal_level=logical
        -c max_replication_slots=4
        -c max_wal_senders=4
    environment:
      POSTGRES_DB: fashiondb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fashiondb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
    ports:
      - "9092:9092"
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy.+true'"]
      interval: 15s
      timeout: 10s
      retries: 5

  debezium:
    image: debezium/connect:2.7.3.Final
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: redpanda:29092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_status
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  consumer:
    build:
      context: ../
      dockerfile: tier3-cdc/consumer/Dockerfile
    depends_on:
      debezium:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: fashiondb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-products}
      CLOUD_INFERENCE: ${CLOUD_INFERENCE:-false}
      DENSE_MODEL: ${DENSE_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      SPARSE_MODEL: ${SPARSE_MODEL:-qdrant/bm25}
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      KAFKA_TOPIC: pgserver.public.products
      KAFKA_GROUP_ID: qdrant-sync
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data: